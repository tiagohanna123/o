name: Validate Model X
on:
  push:
    branches: [ main ]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - run: pip install -r requirements.txt
    - run: python notebooks\cmb_validation.py
    - run: python notebooks\gw_validation.py
    - run: python notebooks\qc_validation.py
